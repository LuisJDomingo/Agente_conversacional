services:
  postgres:
    image: postgres:15
    container_name: booking_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: booking_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - booking_network

  redis:
    image: redis:7-alpine
    container_name: booking_redis
    restart: always
    networks:
      - booking_network

  ollama:
    image: ollama/ollama
    container_name: booking_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - booking_network

  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: booking_evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://user:password@booking_postgres:5432/booking_agent
      SERVER_URL: http://booking_evolution_api:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ClaveSecretaDelAgente123!
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://booking_redis:6379"
    volumes:
      - evolution_store:/evolution/store
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
      - redis
    networks:
      - booking_network

  backend:
    build:
      context: ./backend
    container_name: booking_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@booking_postgres:5432/booking_agent
      REDIS_URL: redis://booking_redis:6379
      OLLAMA_API_BASE: http://booking_ollama:11434/api
      OLLAMA_MODEL: tinyllama
      EVOLUTION_API_BASE_URL: http://booking_evolution_api:8080
      EVOLUTION_INSTANCE_NAME: BookingAgent
      EVOLUTION_API_KEY: ClaveSecretaDelAgente123!
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
      - redis
      - ollama
      - evolution
    networks:
      - booking_network

  frontend:
    build:
      context: ./Frontend
    container_name: booking_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - booking_network

volumes:
  postgres_data:
  ollama_data:
  evolution_store:
  evolution_instances:

networks:
  booking_network:
    driver: bridge